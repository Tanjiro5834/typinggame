spring.application.name=typinggame

# Database Configuration — uses environment variables on Render, falls back to localhost
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/typinggame?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect