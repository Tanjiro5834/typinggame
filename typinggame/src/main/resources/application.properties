spring.application.name=typinggame

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/typinggame?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
# Use 'create' for the first run to sync your @Id fix, then change to 'update'
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate handles this automatically now, no need for the dialect line